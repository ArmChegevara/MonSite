version: '3.8'

services:
  web:
    build: .
    container_name: tadevosyan-it-local
    ports:
      - "3005:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - N8N_WEBHOOK_URL=http://host.docker.internal:5678/webhook/test
    command: npm run dev